<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">HackUnion homepage social preview</title>
  <desc id="desc">HackUnion is a builder-first technology community for developers, designers, founders, AI engineers, and creators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="52%" stop-color="#173372" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 160) rotate(90) scale(260 340)">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.85" />
