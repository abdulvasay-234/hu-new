      <stop offset="0%" stop-color="#f56c00" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#f56c00" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <rect width="1200" height="630" rx="40" fill="url(#glowBlue)" />
  <rect width="1200" height="630" rx="40" fill="url(#glowOrange)" />
  <g opacity="0.18">
